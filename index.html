<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ずびずばテレポ検定</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }
    .screen.active { display: flex; }

    /* カウントダウン画面 */
    .countdown-box {
      width: 460px; background: #1a2a3a; border: 1px solid #2a3f52;
      border-radius: 12px; padding: 4rem 2rem; text-align: center;
    }
    .countdown-label { font-size: 16px; color: #8899aa; margin-bottom: 1rem; }
    .countdown-num { font-size: 96px; font-weight: 500; color: #c8c0f0; line-height: 1; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.15); opacity:0.8; } }

    /* タイトル画面 */
    .title-box {
      width: 460px; background: #1a2a3a; border: 1px solid #2a3f52;
      border-radius: 12px; padding: 2.5rem 2rem; text-align: center; margin-bottom: 1rem;
    }
    .title-main { font-size: 28px; font-weight: 500; color: #c8c0f0; letter-spacing: 0.08em; margin-bottom: 1rem; }
    .title-rule { font-size: 14px; color: #8899aa; line-height: 1.7; margin-bottom: 1.5rem; }
    .name-label { font-size: 13px; color: #8899aa; margin-bottom: 0.5rem; text-align: left; }
    .name-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 0;
    }
    .name-btn {
      padding: 8px 4px; border-radius: 6px; border: 1px solid #334455;
      background: #0f1923; color: #8899aa; font-size: 14px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .name-btn:hover { background: #1a2a3a; border-color: #7F77DD; color: #c8c0f0; }
    .name-btn.selected { background: #2a2060; border-color: #7F77DD; color: #c8c0f0; }

    .start-btn {
      width: 460px; padding: 13px;
      border-radius: 8px; border: 1px solid #7F77DD;
      background: #2a2060; color: #c8c0f0;
      font-size: 16px; cursor: pointer; transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.05em; margin-bottom: 0.75rem;
    }
    .start-btn:hover:not(:disabled) { background: #35298a; }
    .start-btn:disabled { opacity: 0.35; cursor: default; }
    .ranking-btn {
      width: 460px; padding: 11px;
      border-radius: 8px; border: 1px solid #334455;
      background: #1a2a3a; color: #8899aa;
      font-size: 15px; cursor: pointer; transition: background 0.15s;
    }
    .ranking-btn:hover { background: #243040; color: #c8c0f0; }

    /* HUD */
    .hud { width: 460px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .hud-label { font-size: 13px; color: #8899aa; }
    .progress-bar-bg { width: 460px; height: 5px; background: #1e3040; border-radius: 99px; margin-bottom: 1.25rem; }
    .progress-bar-fill { height: 5px; background: #7F77DD; border-radius: 99px; transition: width 0.3s; }

    /* 問題ボックス */
    .question-box {
      width: 460px; background: #1a2a3a; border: 1px solid #2a3f52;
      border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; text-align: center;
    }
    .question-prompt { font-size: 13px; color: #8899aa; margin-bottom: 0.4rem; }
    .question-arrows { font-size: 44px; letter-spacing: 6px; color: #e8e8f0; line-height: 1.2; }

    /* フィードバック */
    .feedback-row { width: 460px; display: flex; justify-content: space-between; align-items: center; min-height: 24px; margin-bottom: 0.6rem; }
    .feedback { font-size: 14px; font-weight: 500; }
    .feedback.correct { color: #7fc44a; }
    .feedback.wrong { color: #e24b4a; }
    .time-display { font-size: 13px; color: #8899aa; }
    .time-display span { font-weight: 500; color: #e0e0e0; }

    /* フィールド */
    .field-container { position: relative; width: 460px; height: 460px; }
    .field-svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .slot {
      position: absolute;
      border: 2px solid #556677; border-radius: 6px;
      background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .slot:hover { background: rgba(127,119,221,0.2); border-color: #7F77DD; }
    .slot.correct { background: rgba(99,153,34,0.3); border-color: #7fc44a; }
    .slot.wrong { background: rgba(226,75,74,0.3); border-color: #e24b4a; }
    .slot.answered { cursor: default; pointer-events: none; }
    .slot-num { font-size: 16px; font-weight: 500; color: #FAC775; }
    .slot-num-counter { font-size: 16px; font-weight: 500; color: #FAC775; transform: rotate(-90deg); }
    .center-dot {
      position: absolute; width: 16px; height: 16px; background: #7F77DD;
      border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .compass { position: absolute; font-size: 16px; font-weight: 500; color: #8899aa; }

    /* 結果画面 */
    .result-box {
      width: 460px; background: #1a2a3a; border: 1px solid #2a3f52;
      border-radius: 12px; padding: 2rem; text-align: center; margin-bottom: 1rem;
    }
    .result-title { font-size: 15px; color: #8899aa; margin-bottom: 1rem; letter-spacing: 0.05em; }
    .result-name { font-size: 14px; color: #c8c0f0; margin-bottom: 0.5rem; }
    .result-score { font-size: 52px; font-weight: 500; color: #7F77DD; }
    .result-sub { font-size: 14px; color: #8899aa; margin-top: 0.25rem; }
    .result-msg { font-size: 16px; color: #e0e0e0; margin-top: 0.75rem; }
    .result-avg { font-size: 14px; color: #8899aa; margin-top: 0.5rem; }
    .result-avg span { font-size: 20px; font-weight: 500; color: #e0e0e0; }
    .saving-msg { font-size: 13px; color: #556677; margin-top: 0.5rem; min-height: 20px; }

    .restart-btn {
      width: 460px; padding: 11px;
      border-radius: 8px; border: 1px solid #334455;
      background: #1a2a3a; color: #e0e0e0;
      font-size: 15px; cursor: pointer; transition: background 0.15s;
      margin-bottom: 0.75rem;
    }
    .restart-btn:hover { background: #243040; }
    .title-btn {
      width: 460px; padding: 11px;
      border-radius: 8px; border: 1px solid #334455;
      background: #1a2a3a; color: #8899aa;
      font-size: 15px; cursor: pointer; transition: background 0.15s;
    }
    .title-btn:hover { background: #243040; }

    /* ランキング画面 */
    .ranking-box {
      width: 460px; background: #1a2a3a; border: 1px solid #2a3f52;
      border-radius: 12px; padding: 2rem; text-align: center; margin-bottom: 1rem;
    }
    .ranking-title { font-size: 18px; font-weight: 500; color: #c8c0f0; margin-bottom: 1.5rem; letter-spacing: 0.05em; }
    .ranking-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 0.5rem;
      background: #0f1923; border: 1px solid #2a3f52;
    }
    .ranking-row.rank-1 { border-color: #c8a840; background: rgba(200,168,64,0.08); }
    .ranking-row.rank-2 { border-color: #8899aa; background: rgba(136,153,170,0.08); }
    .ranking-row.rank-3 { border-color: #a0522d; background: rgba(160,82,45,0.08); }
    .rank-medal { font-size: 22px; width: 32px; }
    .rank-name { font-size: 16px; color: #e0e0e0; flex: 1; text-align: left; margin-left: 0.5rem; }
    .rank-score { font-size: 14px; color: #8899aa; text-align: right; }
    .rank-score strong { font-size: 16px; color: #c8c0f0; }
    .ranking-empty { font-size: 14px; color: #556677; padding: 1rem 0; }
    .ranking-loading { font-size: 14px; color: #556677; padding: 1rem 0; }
    .back-btn {
      width: 460px; padding: 11px;
      border-radius: 8px; border: 1px solid #334455;
      background: #1a2a3a; color: #8899aa;
      font-size: 15px; cursor: pointer; transition: background 0.15s;
    }
    .back-btn:hover { background: #243040; color: #c8c0f0; }
  </style>
</head>
<body>

  <!-- タイトル画面 -->
  <div id="screen-title" class="screen active">
    <div class="title-box">
      <div class="title-main">ずびずばテレポ検定</div>
      <div class="title-rule">デバフの矢印を見て、正しい移動先をクリックしよう！</div>
      <div class="name-label">名前を選んでください</div>
      <div class="name-grid" id="name-grid">
        <button class="name-btn" onclick="selectName(this)">おこじょ</button>
        <button class="name-btn" onclick="selectName(this)">ヴィン</button>
        <button class="name-btn" onclick="selectName(this)">くろえ</button>
        <button class="name-btn" onclick="selectName(this)">もともん</button>
        <button class="name-btn" onclick="selectName(this)">ゆた</button>
        <button class="name-btn" onclick="selectName(this)">りゃん</button>
        <button class="name-btn" onclick="selectName(this)">しゃる</button>
        <button class="name-btn" onclick="selectName(this)">こころ</button>
      </div>
    </div>
    <button class="start-btn" id="start-btn" onclick="beginQuiz()" disabled>テストを始める</button>
    <button class="ranking-btn" onclick="showRanking()">ランキング 🏆</button>
  </div>

  <!-- カウントダウン画面 -->
  <div id="screen-countdown" class="screen">
    <div class="countdown-box">
      <div class="countdown-label">スタートまで</div>
      <div class="countdown-num" id="countdown-num">3</div>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div id="screen-quiz" class="screen">
    <div class="hud">
      <span class="hud-label" id="q-label">問題 1 / 10</span>
      <span class="hud-label" id="score-label">正解: 0</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:10%"></div></div>

    <div class="question-box">
      <div class="question-prompt">このデバフを受けたとき、どの位置に移動しますか？</div>
      <div class="question-arrows" id="arrows-display">↓↓</div>
    </div>

    <div class="feedback-row">
      <div class="feedback" id="feedback"></div>
      <div class="time-display" id="time-display"></div>
    </div>

    <div class="field-container">
      <svg class="field-svg" viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg">
        <circle cx="230" cy="230" r="195" fill="#1a2a3a" stroke="#2a3f52" stroke-width="2"/>
      </svg>

      <div class="compass" style="position:absolute; top:8px; left:50%; transform:translateX(-50%); font-size:16px; font-weight:500; color:#8899aa;">N</div>
      <div class="compass" style="position:absolute; bottom:8px; left:50%; transform:translateX(-50%); font-size:16px; font-weight:500; color:#8899aa;">S</div>
      <div class="compass" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); font-size:16px; font-weight:500; color:#8899aa;">E</div>
      <div class="compass" style="position:absolute; left:8px; top:50%; transform:translateY(-50%); font-size:16px; font-weight:500; color:#8899aa;">W</div>

      <!-- NW: 1,2 (縦向き) -->
      <div class="slot" id="slot-1" data-num="1" style="width:92px; height:38px; top:119px; left:65px; transform:rotate(90deg);"><span class="slot-num-counter">1</span></div>
      <div class="slot" id="slot-2" data-num="2" style="width:92px; height:38px; top:119px; left:119px; transform:rotate(90deg);"><span class="slot-num-counter">2</span></div>
      <!-- NE: 3,4 (横向き) -->
      <div class="slot" id="slot-3" data-num="3" style="width:92px; height:38px; top:92px; left:276px;"><span class="slot-num">3</span></div>
      <div class="slot" id="slot-4" data-num="4" style="width:92px; height:38px; top:146px; left:276px;"><span class="slot-num">4</span></div>
      <!-- SE: 5,6 (縦向き) -->
      <div class="slot" id="slot-5" data-num="5" style="width:92px; height:38px; top:303px; left:303px; transform:rotate(90deg);"><span class="slot-num-counter">5</span></div>
      <div class="slot" id="slot-6" data-num="6" style="width:92px; height:38px; top:303px; left:249px; transform:rotate(90deg);"><span class="slot-num-counter">6</span></div>
      <!-- SW: 7,8 (横向き) -->
      <div class="slot" id="slot-7" data-num="7" style="width:92px; height:38px; top:276px; left:92px;"><span class="slot-num">7</span></div>
      <div class="slot" id="slot-8" data-num="8" style="width:92px; height:38px; top:330px; left:92px;"><span class="slot-num">8</span></div>

      <div class="center-dot"></div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="screen-result" class="screen">
    <div class="result-box">
      <div class="result-title">ずびずばテレポ検定　結果</div>
      <div class="result-name" id="result-name"></div>
      <div class="result-score" id="result-score">0 / 10</div>
      <div class="result-sub">正解数</div>
      <div class="result-msg" id="result-msg"></div>
      <div class="result-avg">平均回答時間: <span id="result-avg">0.00</span> 秒</div>
      <div class="saving-msg" id="saving-msg"></div>
    </div>
    <button class="restart-btn" onclick="beginQuiz()">もう一度挑戦する</button>
    <button class="title-btn" onclick="goTitle()">タイトルに戻る</button>
  </div>

  <!-- ランキング画面 -->
  <div id="screen-ranking" class="screen">
    <div class="ranking-box">
      <div class="ranking-title">🏆 ランキング</div>
      <div id="ranking-list"></div>
    </div>
    <button class="back-btn" onclick="goTitle()">← タイトルに戻る</button>
  </div>

  <script>
    // ======================================================
    // ★ここを自分のJSONBin Secret Keyに書き換えてください★
    const JSONBIN_API_KEY = 'YOUR_API_KEY';
    // ★ここを最初の実行後に発行されるBin IDに書き換えてください★
    // （初回実行時に自動作成されます。コンソールにIDが表示されます）
    let JSONBIN_BIN_ID = 'YOUR_BIN_ID';
    // ======================================================

    const JSONBIN_BASE = 'https://api.jsonbin.io/v3';

    const ANSWERS = {
      1: '↓↓', 2: '←↑', 3: '←←', 4: '↑→',
      5: '↑↑', 6: '→↓', 7: '↓←', 8: '→→'
    };
    const PATTERNS = ['↑↑','↓↓','←←','→→','↑→','→↓','↓←','←↑'];

    let questions = [], current = 0, score = 0;
    let questionStart = 0, times = [];
    let autoTimer = null;
    let selectedName = '';

    // --- 名前選択 ---
    function selectName(btn) {
      document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedName = btn.textContent;
      document.getElementById('start-btn').disabled = false;
    }

    // --- シャッフル ---
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    // --- 問題生成（10問・8パターン最低1回・連続同一パターンなし） ---
    function buildQuestions() {
      // 8パターン全部 + ランダム2問追加で10問
      let result = shuffle([...shuffle(PATTERNS), ...shuffle(PATTERNS).slice(0, 2)]);
      // 連続同一パターンが来ないよう並び替え
      for (let i = 1; i < result.length; i++) {
        if (result[i] === result[i-1]) {
          let swapped = false;
          for (let j = i+1; j < result.length; j++) {
            if (result[j] !== result[i-1] && (j+1 >= result.length || result[j] !== result[i])) {
              [result[i], result[j]] = [result[j], result[i]];
              swapped = true;
              break;
            }
          }
          if (!swapped && i >= 2 && result[i-2] !== result[i]) {
            [result[i], result[i-2]] = [result[i-2], result[i]];
          }
        }
      }
      return result;
    }

    function getCorrectSlot(arrow) {
      for (const [num, pattern] of Object.entries(ANSWERS)) {
        if (pattern === arrow) return parseInt(num);
      }
    }

    function resetSlots() {
      for (let i = 1; i <= 8; i++) {
        document.getElementById('slot-' + i).classList.remove('correct', 'wrong', 'answered');
      }
    }

    function loadQuestion() {
      resetSlots();
      const arrow = questions[current];
      document.getElementById('q-label').textContent = `問題 ${current+1} / 10`;
      document.getElementById('progress-fill').style.width = `${(current+1)*10}%`;
      document.getElementById('arrows-display').textContent = arrow;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('time-display').textContent = '';
      questionStart = performance.now();
    }

    function nextQuestion() {
      current++;
      if (current >= 10) showResult();
      else loadQuestion();
    }

    // --- 結果表示 & スコア保存 ---
    async function showResult() {
      switchScreen('screen-result');
      const avg = times.reduce((a,b) => a+b, 0) / times.length;
      document.getElementById('result-name').textContent = selectedName;
      document.getElementById('result-score').textContent = `${score} / 10`;
      document.getElementById('result-avg').textContent = avg.toFixed(2);
      const msgs = ['もう少し練習しましょう！', 'いい調子です！', 'よくできました！', '完璧です！'];
      document.getElementById('result-msg').textContent = msgs[score <= 4 ? 0 : score <= 6 ? 1 : score <= 9 ? 2 : 3];

      document.getElementById('saving-msg').textContent = '記録を保存中...';
      await saveScore(selectedName, score, avg);
    }

    // --- JSONBin: スコア保存 ---
    async function saveScore(name, sc, avg) {
      try {
        let records = await fetchRecords();
        records.push({ name, score: sc, avg: parseFloat(avg.toFixed(2)), date: new Date().toISOString() });
        await putRecords(records);
        document.getElementById('saving-msg').textContent = '✓ 記録を保存しました';
      } catch(e) {
        document.getElementById('saving-msg').textContent = '※ 記録の保存に失敗しました';
        console.error(e);
      }
    }

    // --- JSONBin: 全レコード取得 ---
    async function fetchRecords() {
      const res = await fetch(`${JSONBIN_BASE}/b/${JSONBIN_BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY, 'X-Bin-Meta': 'false' }
      });
      console.log('fetchRecords status:', res.status);
      if (!res.ok) {
        const err = await res.text();
        console.error('fetchRecords error:', err);
        throw new Error('fetch failed: ' + res.status);
      }
      const data = await res.json();
      console.log('fetchRecords data:', data);
      return Array.isArray(data) ? data : (Array.isArray(data.record) ? data.record : []);
    }

    // --- JSONBin: レコード更新 ---
    async function putRecords(records) {
      const res = await fetch(`${JSONBIN_BASE}/b/${JSONBIN_BIN_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
        body: JSON.stringify(records)
      });
      console.log('putRecords status:', res.status);
      if (!res.ok) {
        const err = await res.text();
        console.error('putRecords error:', err);
        throw new Error('put failed: ' + res.status);
      }
    }

    // --- ランキング表示 ---
    async function showRanking() {
      switchScreen('screen-ranking');
      const list = document.getElementById('ranking-list');
      list.innerHTML = '<div class="ranking-loading">読み込み中...</div>';
      try {
        const records = await fetchRecords();
        if (records.length === 0) {
          list.innerHTML = '<div class="ranking-empty">まだ記録がありません</div>';
          return;
        }
        // 各名前のベストスコアを抽出（正答数降順→平均秒数昇順）
        const bestByName = {};
        for (const r of records) {
          const prev = bestByName[r.name];
          if (!prev || r.score > prev.score || (r.score === prev.score && r.avg < prev.avg)) {
            bestByName[r.name] = r;
          }
        }
        const sorted = Object.values(bestByName).sort((a, b) =>
          b.score !== a.score ? b.score - a.score : (a.avg ?? 99) - (b.avg ?? 99)
        ).slice(0, 3);
        const medals = ['🥇','🥈','🥉'];
        list.innerHTML = sorted.map((r, i) => `
          <div class="ranking-row rank-${i+1}">
            <span class="rank-medal">${medals[i]}</span>
            <span class="rank-name">${r.name}</span>
            <span class="rank-score"><strong>${r.score}/10</strong>　${r.avg != null ? Number(r.avg).toFixed(2) : '-.--'}秒</span>
          </div>
        `).join('');
      } catch(e) {
        list.innerHTML = '<div class="ranking-empty">読み込みに失敗しました</div>';
        console.error(e);
      }
    }

    function switchScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function beginQuiz() {
      if (!selectedName) return;
      questions = buildQuestions();
      current = 0; score = 0; times = [];
      document.getElementById('score-label').textContent = '正解: 0';
      switchScreen('screen-countdown');
      let count = 3;
      document.getElementById('countdown-num').textContent = count;
      const timer = setInterval(() => {
        count--;
        if (count > 0) {
          document.getElementById('countdown-num').textContent = count;
        } else {
          clearInterval(timer);
          switchScreen('screen-quiz');
          loadQuestion();
        }
      }, 1000);
    }

    function goTitle() {
      switchScreen('screen-title');
    }

    document.querySelectorAll('.slot').forEach(slot => {
      slot.addEventListener('click', () => {
        const elapsed = (performance.now() - questionStart) / 1000;
        times.push(elapsed);

        const clicked = parseInt(slot.dataset.num);
        const arrow = questions[current];
        const correct = getCorrectSlot(arrow);
        const fb = document.getElementById('feedback');
        const td = document.getElementById('time-display');

        document.querySelectorAll('.slot').forEach(s => s.classList.add('answered'));
        td.innerHTML = `回答時間: <span>${elapsed.toFixed(2)}秒</span>`;

        if (clicked === correct) {
          score++;
          slot.classList.add('correct');
          fb.textContent = '正解！';
          fb.className = 'feedback correct';
        } else {
          slot.classList.add('wrong');
          document.getElementById('slot-' + correct).classList.add('correct');
          fb.textContent = `不正解… 正解は ${correct}番でした`;
          fb.className = 'feedback wrong';
        }

        document.getElementById('score-label').textContent = `正解: ${score}`;
        clearTimeout(autoTimer);
        autoTimer = setTimeout(() => nextQuestion(), 1500);
      });
    });
  </script>
</body>
</html>
