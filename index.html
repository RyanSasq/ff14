<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ずびずばテレポ検定</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }
    .screen.active { display: flex; }

    /* タイトル画面 */
    .title-box {
      width: 460px; background: #1a2a3a; border: 1px solid #2a3f52;
      border-radius: 12px; padding: 3rem 2rem; text-align: center; margin-bottom: 1.5rem;
    }
    .title-main { font-size: 28px; font-weight: 500; color: #c8c0f0; letter-spacing: 0.08em; margin-bottom: 1.25rem; }
    .title-rule { font-size: 14px; color: #8899aa; line-height: 1.7; }
    .start-btn {
      width: 460px; padding: 13px;
      border-radius: 8px; border: 1px solid #7F77DD;
      background: #2a2060; color: #c8c0f0;
      font-size: 16px; cursor: pointer; transition: background 0.15s;
      letter-spacing: 0.05em;
    }
    .start-btn:hover { background: #35298a; }

    /* HUD */
    .hud { width: 460px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .hud-label { font-size: 13px; color: #8899aa; }
    .progress-bar-bg { width: 460px; height: 5px; background: #1e3040; border-radius: 99px; margin-bottom: 1.25rem; }
    .progress-bar-fill { height: 5px; background: #7F77DD; border-radius: 99px; transition: width 0.3s; }

    /* 問題ボックス */
    .question-box {
      width: 460px; background: #1a2a3a; border: 1px solid #2a3f52;
      border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; text-align: center;
    }
    .question-prompt { font-size: 13px; color: #8899aa; margin-bottom: 0.4rem; }
    .question-arrows { font-size: 44px; letter-spacing: 6px; color: #e8e8f0; line-height: 1.2; }

    /* フィードバック */
    .feedback-row { width: 460px; display: flex; justify-content: space-between; align-items: center; min-height: 24px; margin-bottom: 0.6rem; }
    .feedback { font-size: 14px; font-weight: 500; }
    .feedback.correct { color: #7fc44a; }
    .feedback.wrong { color: #e24b4a; }
    .time-display { font-size: 13px; color: #8899aa; }
    .time-display span { font-weight: 500; color: #e0e0e0; }

    /* フィールド */
    .field-container { position: relative; width: 460px; height: 460px; }
    .field-svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .slot {
      position: absolute; width: 104px; height: 44px;
      border: 2px solid #556677; border-radius: 6px;
      background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .slot:hover { background: rgba(127,119,221,0.2); border-color: #7F77DD; }
    .slot.correct { background: rgba(99,153,34,0.3); border-color: #7fc44a; }
    .slot.wrong { background: rgba(226,75,74,0.3); border-color: #e24b4a; }
    .slot.answered { cursor: default; pointer-events: none; }
    .slot-num { font-size: 20px; font-weight: 500; color: #FAC775; }
    .slot-num-counter { font-size: 20px; font-weight: 500; color: #FAC775; transform: rotate(-90deg); }
    .center-dot {
      position: absolute; width: 16px; height: 16px; background: #7F77DD;
      border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .compass { position: absolute; font-size: 16px; font-weight: 500; color: #8899aa; }

    /* 結果画面 */
    .result-box {
      width: 460px; background: #1a2a3a; border: 1px solid #2a3f52;
      border-radius: 12px; padding: 2rem; text-align: center; margin-bottom: 1rem;
    }
    .result-title { font-size: 15px; color: #8899aa; margin-bottom: 1rem; letter-spacing: 0.05em; }
    .result-score { font-size: 52px; font-weight: 500; color: #7F77DD; }
    .result-sub { font-size: 14px; color: #8899aa; margin-top: 0.25rem; }
    .result-msg { font-size: 16px; color: #e0e0e0; margin-top: 0.75rem; }
    .result-avg { font-size: 14px; color: #8899aa; margin-top: 0.5rem; }
    .result-avg span { font-size: 20px; font-weight: 500; color: #e0e0e0; }
    .restart-btn {
      width: 460px; padding: 11px;
      border-radius: 8px; border: 1px solid #334455;
      background: #1a2a3a; color: #e0e0e0;
      font-size: 15px; cursor: pointer; transition: background 0.15s;
      margin-bottom: 0.75rem;
    }
    .restart-btn:hover { background: #243040; }
    .title-btn {
      width: 460px; padding: 11px;
      border-radius: 8px; border: 1px solid #334455;
      background: #1a2a3a; color: #8899aa;
      font-size: 15px; cursor: pointer; transition: background 0.15s;
    }
    .title-btn:hover { background: #243040; }
  </style>
</head>
<body>

  <!-- タイトル画面 -->
  <div id="screen-title" class="screen active">
    <div class="title-box">
      <div class="title-main">ずびずばテレポ検定</div>
      <div class="title-rule">デバフの矢印を見て、正しい移動先をクリックしよう！</div>
    </div>
    <button class="start-btn" onclick="beginQuiz()">テストを始める</button>
  </div>

  <!-- クイズ画面 -->
  <div id="screen-quiz" class="screen">
    <div class="hud">
      <span class="hud-label" id="q-label">問題 1 / 10</span>
      <span class="hud-label" id="score-label">正解: 0</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:10%"></div></div>

    <div class="question-box">
      <div class="question-prompt">このデバフを受けたとき、どの位置に移動しますか？</div>
      <div class="question-arrows" id="arrows-display">↓↓</div>
    </div>

    <div class="feedback-row">
      <div class="feedback" id="feedback"></div>
      <div class="time-display" id="time-display"></div>
    </div>

    <div class="field-container">
      <svg class="field-svg" viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg">
        <circle cx="230" cy="230" r="195" fill="#1a2a3a" stroke="#2a3f52" stroke-width="2"/>
      </svg>

      <div class="compass" style="top:8px; left:50%; transform:translateX(-50%);">N</div>
      <div class="compass" style="bottom:8px; left:50%; transform:translateX(-50%);">S</div>
      <div class="compass" style="right:8px; top:50%; transform:translateY(-50%);">E</div>
      <div class="compass" style="left:8px; top:50%; transform:translateY(-50%);">W</div>

      <div class="slot" id="slot-1" data-num="1" style="top:94px; left:115px; transform:rotate(90deg);"><span class="slot-num-counter">1</span></div>
      <div class="slot" id="slot-2" data-num="2" style="top:94px; left:178px; transform:rotate(90deg);"><span class="slot-num-counter">2</span></div>
      <div class="slot" id="slot-3" data-num="3" style="top:145px; left:292px;"><span class="slot-num">3</span></div>
      <div class="slot" id="slot-4" data-num="4" style="top:208px; left:292px;"><span class="slot-num">4</span></div>
      <div class="slot" id="slot-5" data-num="5" style="top:322px; left:241px; transform:rotate(90deg);"><span class="slot-num-counter">5</span></div>
      <div class="slot" id="slot-6" data-num="6" style="top:322px; left:178px; transform:rotate(90deg);"><span class="slot-num-counter">6</span></div>
      <div class="slot" id="slot-7" data-num="7" style="top:271px; left:64px;"><span class="slot-num">7</span></div>
      <div class="slot" id="slot-8" data-num="8" style="top:208px; left:64px;"><span class="slot-num">8</span></div>

      <div class="center-dot"></div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="screen-result" class="screen">
    <div class="result-box">
      <div class="result-title">ずびずばテレポ検定　結果</div>
      <div class="result-score" id="result-score">0 / 10</div>
      <div class="result-sub">正解数</div>
      <div class="result-msg" id="result-msg"></div>
      <div class="result-avg">平均回答時間: <span id="result-avg">0.00</span> 秒</div>
    </div>
    <button class="restart-btn" onclick="beginQuiz()">もう一度挑戦する</button>
    <button class="title-btn" onclick="goTitle()">タイトルに戻る</button>
  </div>

  <script>
    const ANSWERS = {
      1: '↓↓', 2: '←↑', 3: '←←', 4: '↑→',
      5: '↑↑', 6: '→↓', 7: '→→', 8: '↓←'
    };
    const PATTERNS = ['↑↑','↓↓','←←','→→','↑→','→↓','↓←','←↑'];

    let questions = [], current = 0, score = 0;
    let questionStart = 0, times = [];
    let autoTimer = null;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    function buildQuestions() {
      let result = shuffle([...shuffle(PATTERNS), ...shuffle(PATTERNS).slice(0,2)]);
      // 2問連続で同じパターンが来ないように並び替え
      for (let i = 1; i < result.length; i++) {
        if (result[i] === result[i-1]) {
          // 同じなら後ろから異なる要素を探して交換
          let swapped = false;
          for (let j = i+1; j < result.length; j++) {
            if (result[j] !== result[i-1] && (j+1 >= result.length || result[j] !== result[i])) {
              [result[i], result[j]] = [result[j], result[i]];
              swapped = true;
              break;
            }
          }
          // 交換できなかった場合は前と入れ替え
          if (!swapped && i >= 2 && result[i-2] !== result[i]) {
            [result[i], result[i-2]] = [result[i-2], result[i]];
          }
        }
      }
      return result;
    }

    function getCorrectSlot(arrow) {
      for (const [num, pattern] of Object.entries(ANSWERS)) {
        if (pattern === arrow) return parseInt(num);
      }
    }

    function resetSlots() {
      for (let i = 1; i <= 8; i++) {
        const s = document.getElementById('slot-' + i);
        s.classList.remove('correct', 'wrong', 'answered');
      }
    }

    function loadQuestion() {
      resetSlots();
      const arrow = questions[current];
      document.getElementById('q-label').textContent = `問題 ${current+1} / 10`;
      document.getElementById('progress-fill').style.width = `${(current+1)*10}%`;
      document.getElementById('arrows-display').textContent = arrow;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('time-display').textContent = '';
      questionStart = performance.now();
    }

    function nextQuestion() {
      current++;
      if (current >= 10) {
        showResult();
      } else {
        loadQuestion();
      }
    }

    function showResult() {
      switchScreen('screen-result');
      document.getElementById('result-score').textContent = `${score} / 10`;
      const avg = times.reduce((a,b) => a+b, 0) / times.length;
      document.getElementById('result-avg').textContent = avg.toFixed(2);
      const msgs = ['もう少し練習しましょう！', 'いい調子です！', 'よくできました！', '完璧です！'];
      document.getElementById('result-msg').textContent = msgs[score <= 4 ? 0 : score <= 6 ? 1 : score <= 9 ? 2 : 3];
    }

    function switchScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function beginQuiz() {
      questions = buildQuestions();
      current = 0; score = 0; times = [];
      document.getElementById('score-label').textContent = '正解: 0';
      switchScreen('screen-quiz');
      loadQuestion();
    }

    function goTitle() {
      switchScreen('screen-title');
    }

    document.querySelectorAll('.slot').forEach(slot => {
      slot.addEventListener('click', () => {
        const elapsed = (performance.now() - questionStart) / 1000;
        times.push(elapsed);

        const clicked = parseInt(slot.dataset.num);
        const arrow = questions[current];
        const correct = getCorrectSlot(arrow);
        const fb = document.getElementById('feedback');
        const td = document.getElementById('time-display');

        document.querySelectorAll('.slot').forEach(s => s.classList.add('answered'));
        td.innerHTML = `回答時間: <span>${elapsed.toFixed(2)}秒</span>`;

        if (clicked === correct) {
          score++;
          slot.classList.add('correct');
          fb.textContent = '正解！';
          fb.className = 'feedback correct';
        } else {
          slot.classList.add('wrong');
          document.getElementById('slot-' + correct).classList.add('correct');
          fb.textContent = `不正解… 正解は ${correct}番でした`;
          fb.className = 'feedback wrong';
        }

        document.getElementById('score-label').textContent = `正解: ${score}`;
        clearTimeout(autoTimer);
        autoTimer = setTimeout(() => nextQuestion(), 1500);
      });
    });
  </script>
</body>
</html>
